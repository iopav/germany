name: germany
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  easy_localization: ^3.0.8
  flutter:
    sdk: flutter
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  image_picker: ^1.2.2
  json_annotation: ^4.12.0
  logger: ^2.7.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700

    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_24pt-Medium.ttf
        - asset: assets/fonts/Inter_24pt-Regular.ttf
          weight: 500
